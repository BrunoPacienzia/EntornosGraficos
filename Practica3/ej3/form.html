<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, shrink-to-fit=no"
    />

    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css"
      integrity="sha384-xOolHFLEh07PJGoPkLv1IbcEPTNtaed2xpHsD9ESMhqIYd0nLMwNLD69Npy4HI+N"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="estilo.css" />

    <title>Hello, world!</title>
  </head>
  <body>
    <form>
      <div class="form-group">
        <label for="exampleInputName1">Nombre</label>
        <input
          type="text"
          class="form-control"
          id="exampleInputName1"
          aria-describedby="emailHelp"
        />
      </div>
      <div class="form-group">
        <label for="exampleInputEmail1">Email</label>
        <input
          type="email"
          class="form-control"
          id="exampleInputEmail1"
          aria-describedby="emailHelp"
        />
      </div>
      <div class="form-group">
        <label for="exampleInputNumber1">Telefono</label>
        <input type="text" class="form-control" id="exampleInputNumber1" />
      </div>

      <div class="form-group">
        <label for="exampleInputAsunto1">Asunto</label>
        <input type="text" class="form-control" id="exampleInputAsunto1" />
      </div>
      <div class="form-group">
        <label for="exampleInputMensaje1">Mensaje</label>
        <textarea
          class="form-control"
          id="exampleInputMensaje1"
          rows="4"
        ></textarea>
      </div>
      <button type="submit" class="btn btn-primary">Submit</button>
    </form>
  </body>
</html>
